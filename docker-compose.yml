services:
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME}
      APP_DEBUG: ${APP_DEBUG}
      BACKEND_HOST: ${BACKEND_HOST}
      BACKEND_PORT: ${BACKEND_PORT}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      AUTH_SECRET: ${AUTH_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - happiness-network

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - ${POSTGRES_HOST_PORT}:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - happiness-network

  frontend:
    build:
      context: ./frontend
    volumes:
      - frontend_dist:/output

  caddy:
    image: caddy:2.8-alpine
    depends_on:
      - backend
      - frontend
    ports:
      - ${CADDY_PORT}:80
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - frontend_dist:/srv/frontend:ro
    networks:
      - happiness-network

volumes:
  postgres_data:
  frontend_dist:

networks:
  happiness-network:

